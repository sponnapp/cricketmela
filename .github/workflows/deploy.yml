name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy _redirects to dist
        working-directory: frontend
        run: |
          if [ -f "public/_redirects" ]; then
            cp public/_redirects dist/_redirects
          elif [ -f "_redirects" ]; then
            cp _redirects dist/_redirects
          fi

      - name: Copy _headers to dist
        working-directory: frontend
        run: |
          if [ -f "public/_headers" ]; then
            cp public/_headers dist/_headers
          fi

      - name: Generate version.json
        working-directory: frontend
        run: |
          VERSION="${{ github.sha }}"
          SHORT_VERSION="${VERSION:0:7}"
          echo "{\"version\":\"$SHORT_VERSION\",\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > dist/version.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=cricketmela --commit-dirty=true
