<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Blue background circle -->
  <circle cx="100" cy="100" r="95" fill="#003D82" stroke="#ffffff" stroke-width="2"/>

  <!-- Stars pattern -->
  <circle cx="30" cy="30" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="170" cy="40" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="180" cy="150" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="170" r="3" fill="#ffffff" opacity="0.6"/>

  <!-- Cricket bat (simplified) -->
  <g transform="translate(60, 70)">
    <rect x="5" y="0" width="8" height="35" fill="#ffffff" rx="2"/>
    <ellipse cx="9" cy="40" rx="8" ry="6" fill="#ffffff"/>
  </g>

  <!-- Cricket ball -->
  <circle cx="100" cy="100" r="20" fill="#ffffff"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#003D82" stroke-width="2"/>
  <path d="M 80 100 Q 100 110 120 100" fill="none" stroke="#003D82" stroke-width="1.5"/>

  <!-- Text: CRICKET -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle" fill="#ffffff">CRICKET</text>

  <!-- Text: MELA -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle" fill="#ffffff">MELA</text>
</svg>

